<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>LIMIT ZERO BREAKERS FITTING</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  text-align: center;
  color: white;
  background:
    radial-gradient(circle at top left, #7c8cff 0, transparent 35%),
    radial-gradient(circle at bottom right, #ff9acb 0, transparent 30%),
    linear-gradient(135deg, #12152f, #252a63, #101426);
  min-height: 100vh;
}

.header {
  padding: 35px 20px 15px;
}

h1 {
  margin: 0;
  font-size: 34px;
  letter-spacing: 2px;
}

.subtitle {
  margin-top: 10px;
  color: #dfe4ff;
}

.container {
  width: 90%;
  max-width: 980px;
  margin: 20px auto;
  padding: 25px;
  border-radius: 28px;
  background: rgba(255,255,255,0.13);
  backdrop-filter: blur(12px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.25);
}

.upload-box {
  margin-bottom: 20px;
}

input {
  padding: 12px;
  background: white;
  color: #222;
  border-radius: 14px;
}

#stage {
  width: 360px;
  height: 520px;
  margin: 20px auto;
  position: relative;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.95), rgba(225,232,255,0.95));
  border: 4px solid rgba(255,255,255,0.8);
  border-radius: 28px;
  overflow: hidden;
  box-shadow: inset 0 0 30px rgba(90,100,255,0.25),
              0 15px 35px rgba(0,0,0,0.35);
}

#stage::before {
  content: "FITTING ROOM";
  position: absolute;
  top: 15px;
  left: 0;
  right: 0;
  font-weight: bold;
  color: rgba(60,70,160,0.25);
  letter-spacing: 3px;
}

#user, #costume {
  position: absolute;
  top: 0;
  left: 0;
  max-width: 100%;
}

#costume {
  width: 210px;
  left: 75px;
  top: 130px;
  cursor: grab;
}

.buttons {
  margin-top: 20px;
}

button {
  margin: 7px;
  padding: 12px 18px;
  border: none;
  border-radius: 999px;
  background: linear-gradient(135deg, #6d7cff, #ff7abc);
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 8px 18px rgba(0,0,0,0.25);
}

button:hover {
  transform: translateY(-2px);
}

.info {
  margin-top: 18px;
  color: #e8ebff;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  <h1>LIMIT ZERO BREAKERS CAFE</h1>
  <p class="subtitle">캐릭터 의상 피팅 체험</p>
</div>

<div class="container">
  <div class="upload-box">
    <p>내 사진을 업로드하고 캐릭터 의상을 입혀보세요</p>
    <input type="file" id="upload" accept="image/*">
  </div>

  <div id="stage">
    <img id="user">
    <img id="costume">
  </div>

  <div class="buttons">
    <button onclick="changeCostume('shion.png')">시온 의상</button>
    <button onclick="changeCostume('kaito.png')">카이토 의상</button>
    <button onclick="changeCostume('liz.png')">리즈 의상</button>
    <button onclick="makeBigger()">크게</button>
    <button onclick="makeSmaller()">작게</button>
  </div>

  <p class="info">의상을 마우스로 끌어서 위치를 조절할 수 있습니다.</p>
</div>

<script>
const user = document.getElementById("user");
const costume = document.getElementById("costume");

document.getElementById("upload").onchange = function(e) {
  user.src = URL.createObjectURL(e.target.files[0]);
};

function changeCostume(fileName) {
  costume.src = fileName;
}

let costumeSize = 210;

function makeBigger() {
  costumeSize += 20;
  costume.style.width = costumeSize + "px";
}

function makeSmaller() {
  costumeSize -= 20;
  costume.style.width = costumeSize + "px";
}

let dragging = false;
let offsetX = 0;
let offsetY = 0;

costume.onmousedown = function(e) {
  dragging = true;
  offsetX = e.offsetX;
  offsetY = e.offsetY;
};

document.onmouseup = function() {
  dragging = false;
};

document.onmousemove = function(e) {
  if (dragging) {
    const stage = document.getElementById("stage").getBoundingClientRect();
    costume.style.left = (e.clientX - stage.left - offsetX) + "px";
    costume.style.top = (e.clientY - stage.top - offsetY) + "px";
  }
};
</script>

</body>
</html>
