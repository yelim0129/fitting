<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>LIMIT ZERO BREAKERS FITTING</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  min-height: 100vh;
  background:
    linear-gradient(rgba(10, 15, 35, 0.55), rgba(10, 15, 35, 0.7)),
    url("cafe-bg.png");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

.header {
  padding: 24px 20px 10px;
  text-shadow: 0 3px 12px rgba(0,0,0,0.7);
}

h1 { margin: 0; font-size: 34px; letter-spacing: 2px; }
.subtitle { margin-top: 8px; color: #eef2ff; }

.top-controls {
  width: 90%;
  max-width: 1050px;
  margin: 15px auto;
  padding: 14px;
  border-radius: 22px;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(10px);
}

input, button {
  margin: 6px;
  padding: 11px 16px;
  border-radius: 999px;
  border: none;
}

button {
  background: linear-gradient(135deg, #4d6cff, #8f6bff);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.main {
  width: 90%;
  max-width: 1050px;
  margin: 15px auto 40px;
  display: flex;
  justify-content: center;
  gap: 24px;
}

.fitting-box, .closet {
  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 28px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.45);
}

.fitting-box {
  padding: 22px;
  width: 430px;
}

#stage {
  width: 360px;
  height: 520px;
  margin: 0 auto;
  position: relative;
  background: rgba(255,255,255,0.92);
  border: 4px solid rgba(255,255,255,0.85);
  border-radius: 28px;
  overflow: hidden;
}

#stage::before {
  content: "FITTING ROOM";
  position: absolute;
  top: 15px;
  left: 0;
  right: 0;
  font-weight: bold;
  color: rgba(60,70,160,0.25);
  letter-spacing: 3px;
  z-index: 1;
}

#user, #costume {
  position: absolute;
  top: 0;
  left: 0;
  max-width: 100%;
}

#user { z-index: 2; }

#costume {
  width: 210px;
  left: 75px;
  top: 130px;
  cursor: grab;
  z-index: 3;
}

.closet {
  width: 540px;
  padding: 20px;
  text-align: left;
}

.closet-title {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 6px;
}

.closet-sub {
  font-size: 14px;
  color: #e8ebff;
  margin-bottom: 18px;
}

.category {
  margin-bottom: 18px;
}

.category h3 {
  margin: 0 0 10px;
  padding-left: 8px;
  border-left: 4px solid #a992ff;
}

.items {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.item {
  width: 105px;
  height: 125px;
  background: rgba(255,255,255,0.9);
  border-radius: 16px;
  padding: 8px;
  text-align: center;
  color: #222;
  cursor: pointer;
  transition: 0.2s;
}

.item:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.35);
}

.item img {
  width: 85px;
  height: 85px;
  object-fit: contain;
}

.item p {
  margin: 4px 0 0;
  font-size: 12px;
  font-weight: bold;
}

.info {
  margin-top: 14px;
  color: #f3f5ff;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
  <h1>LIMIT ZERO BREAKERS CAFE</h1>
  <p class="subtitle">잠공정 카페 의상 피팅 체험</p>
</div>

<div class="top-controls">
  <input type="file" id="upload" accept="image/*">
  <button onclick="makeBigger()">의상 크게</button>
  <button onclick="makeSmaller()">의상 작게</button>
  <button onclick="resetCostume()">리셋</button>
</div>

<div class="main">

  <div class="fitting-box">
    <div id="stage">
      <img id="user">
      <img id="costume">
    </div>
    <p class="info">의상을 마우스로 끌어서 위치를 조절할 수 있습니다.</p>
  </div>

  <div class="closet">
    <div class="closet-title">COSTUME CLOSET</div>
    <div class="closet-sub">캐릭터 의상을 선택해 피팅해보세요.</div>

    <div class="category">
      <h3>캐릭터 의상</h3>
      <div class="items">
        <div class="item" onclick="changeCostume('shion.png')">
          <img src="shion.png">
          <p>시온</p>
        </div>

        <div class="item" onclick="changeCostume('kaito.png')">
          <img src="kaito.png">
          <p>카이토</p>
        </div>

        <div class="item" onclick="changeCostume('liz.png')">
          <img src="liz.png">
          <p>리즈</p>
        </div>
      </div>
    </div>

    <div class="category">
      <h3>기능</h3>
      <div class="items">
        <div class="item" onclick="makeBigger()">
          <p>크게</p>
        </div>
        <div class="item" onclick="makeSmaller()">
          <p>작게</p>
        </div>
        <div class="item" onclick="resetCostume()">
          <p>리셋</p>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
const user = document.getElementById("user");
const costume = document.getElementById("costume");

document.getElementById("upload").onchange = function(e) {
  user.src = URL.createObjectURL(e.target.files[0]);
};

function changeCostume(fileName) {
  costume.src = fileName;
}

let costumeSize = 210;

function makeBigger() {
  costumeSize += 20;
  costume.style.width = costumeSize + "px";
}

function makeSmaller() {
  costumeSize -= 20;
  costume.style.width = costumeSize + "px";
}

function resetCostume() {
  costume.src = "";
  costume.style.left = "75px";
  costume.style.top = "130px";
  costumeSize = 210;
  costume.style.width = costumeSize + "px";
}

let dragging = false;
let offsetX = 0;
let offsetY = 0;

costume.onmousedown = function(e) {
  dragging = true;
  offsetX = e.offsetX;
  offsetY = e.offsetY;
};

document.onmouseup = function() {
  dragging = false;
};

document.onmousemove = function(e) {
  if (dragging) {
    const stage = document.getElementById("stage").getBoundingClientRect();
    costume.style.left = (e.clientX - stage.left - offsetX) + "px";
    costume.style.top = (e.clientY - stage.top - offsetY) + "px";
  }
};
</script>

</body>
</html>
