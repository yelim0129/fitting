<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Liz Fitting Room</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url("cafe-bg.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: white;
      text-align: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: -1;
    }

    header {
      padding: 18px;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 2px 8px black;
    }

    .controls {
      margin: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    .file-button {
      background: rgba(40, 40, 40, 0.9);
      color: white;
      border: 1px solid white;
      border-radius: 8px;
      padding: 9px 15px;
      cursor: pointer;
      font-size: 15px;
    }

    #photoInput {
      display: none;
    }

    .main {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 25px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .fitting-area {
      position: relative;
      width: 380px;
      height: 540px;
      background: rgba(20, 20, 20, 0.72);
      border: 3px solid white;
      border-radius: 16px;
      overflow: hidden;
    }

    #placeholder {
      position: absolute;
      width: 100%;
      top: 48%;
      left: 0;
      transform: translateY(-50%);
      color: #ddd;
      font-size: 18px;
      z-index: 0;
    }

    #userPhoto {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      left: 0;
      top: 0;
      z-index: 1;
    }

    .wear-item {
      position: absolute;
      width: 180px;
      z-index: 2;
      cursor: move;
      user-select: none;
      touch-action: none;
    }

    #accessory { left: 145px; top: 80px; }
    #top { left: 100px; top: 190px; }
    #bottom { left: 105px; top: 300px; }
    #gloves { left: 85px; top: 240px; }
    #shoes { left: 120px; top: 420px; }

    .closet {
      width: 360px;
      min-height: 540px;
      border: 3px solid white;
      border-radius: 16px;
      padding: 16px;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.6);
    }

    .closet h2 {
      margin-top: 0;
      text-shadow: 0 2px 6px black;
    }

    .category {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 12px;
    }

    .category-title {
      text-align: left;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .items {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .item {
      width: 70px;
      height: 70px;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 5px;
      cursor: pointer;
      box-sizing: border-box;
    }

    .item:hover {
      transform: scale(1.08);
      box-shadow: 0 0 12px white;
    }

    .item.selected {
      border: 2px solid #ffe866;
      box-shadow: 0 0 16px #ffe866;
      background: rgba(255, 232, 102, 0.25);
    }
  </style>
</head>

<body>
  <header>LIMIT ZERO BREAKERS - LIZ FITTING ROOM</header>

  <div class="controls">
    <label for="photoInput" class="file-button">내 사진</label>
    <input type="file" id="photoInput" accept="image/*">

    <button onclick="changeSize(10)">+</button>
    <button onclick="changeSize(-10)">-</button>
    <button onclick="resetAll()">Reset</button>
  </div>

  <div class="main">
    <div class="fitting-area">
      <div id="placeholder">내 사진을 넣어주세요</div>
      <img id="userPhoto">

      <img id="accessory" class="wear-item">
      <img id="shoes" class="wear-item">
      <img id="gloves" class="wear-item">
      <img id="top" class="wear-item">
      <img id="bottom" class="wear-item">
    </div>

    <div class="closet">
      <h2>Liz Closet</h2>

      <div class="category">
        <div class="category-title">악세서리</div>
        <div class="items">
          <img class="item" src="assets/liz/accessory/accessory1.png" onclick="wear('accessory', this, 90)">
        </div>
      </div>

      <div class="category">
        <div class="category-title">신발</div>
        <div class="items">
          <img class="item" src="assets/liz/shoes/shoes1.png" onclick="wear('shoes', this, 140)">
        </div>
      </div>

      <div class="category">
        <div class="category-title">장갑</div>
        <div class="items">
          <img class="item" src="assets/liz/gloves/gloves1.png" onclick="wear('gloves', this, 170)">
        </div>
      </div>

      <div class="category">
        <div class="category-title">상의</div>
        <div class="items">
          <img class="item" src="assets/liz/top/top1.png" onclick="wear('top', this, 190)">
        </div>
      </div>

      <div class="category">
        <div class="category-title">하의</div>
        <div class="items">
          <img class="item" src="assets/liz/bottom/bottom1.png" onclick="wear('bottom', this, 180)">
        </div>
      </div>
    </div>
  </div>

  <script>
    let selectedWearItem = null;

    const photoInput = document.getElementById("photoInput");
    const userPhoto = document.getElementById("userPhoto");
    const placeholder = document.getElementById("placeholder");

    photoInput.addEventListener("change", function () {
      const file = this.files[0];
      if (!file) return;

      userPhoto.src = URL.createObjectURL(file);
      placeholder.style.display = "none";
    });

    function wear(part, clickedItem, size) {
      const target = document.getElementById(part);

      target.src = clickedItem.src;
      target.style.width = size + "px";
      selectedWearItem = target;

      const category = clickedItem.closest(".category");
      category.querySelectorAll(".item").forEach(item => {
        item.classList.remove("selected");
      });

      clickedItem.classList.add("selected");
    }

    function changeSize(amount) {
      if (!selectedWearItem) return;

      const nowWidth = selectedWearItem.offsetWidth;
      let newWidth = nowWidth + amount;

      if (newWidth < 40) newWidth = 40;
      if (newWidth > 500) newWidth = 500;

      selectedWearItem.style.width = newWidth + "px";
    }

    function resetAll() {
      document.querySelectorAll(".wear-item").forEach(item => {
        item.removeAttribute("src");
      });

      document.querySelectorAll(".item").forEach(item => {
        item.classList.remove("selected");
      });

      document.getElementById("accessory").style.left = "145px";
      document.getElementById("accessory").style.top = "80px";

      document.getElementById("top").style.left = "100px";
      document.getElementById("top").style.top = "190px";

      document.getElementById("bottom").style.left = "105px";
      document.getElementById("bottom").style.top = "300px";

      document.getElementById("gloves").style.left = "85px";
      document.getElementById("gloves").style.top = "240px";

      document.getElementById("shoes").style.left = "120px";
      document.getElementById("shoes").style.top = "420px";

      selectedWearItem = null;
    }

    let dragged = null;
    let offsetX = 0;
    let offsetY = 0;

    document.querySelectorAll(".wear-item").forEach(item => {
      item.addEventListener("mousedown", startDrag);
      item.addEventListener("touchstart", startDragTouch);
    });

    function startDrag(e) {
      if (!e.target.src) return;

      dragged = e.target;
      selectedWearItem = dragged;

      const rect = dragged.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
    }

    function startDragTouch(e) {
      if (!e.target.src) return;

      dragged = e.target;
      selectedWearItem = dragged;

      const touch = e.touches[0];
      const rect = dragged.getBoundingClientRect();
      offsetX = touch.clientX - rect.left;
      offsetY = touch.clientY - rect.top;
    }

    document.addEventListener("mousemove", function (e) {
      if (!dragged) return;
      moveItem(e.clientX, e.clientY);
    });

    document.addEventListener("touchmove", function (e) {
      if (!dragged) return;
      const touch = e.touches[0];
      moveItem(touch.clientX, touch.clientY);
    });

    function moveItem(clientX, clientY) {
      const area = document.querySelector(".fitting-area");
      const areaRect = area.getBoundingClientRect();

      dragged.style.left = clientX - areaRect.left - offsetX + "px";
      dragged.style.top = clientY - areaRect.top - offsetY + "px";
    }

    document.addEventListener("mouseup", function () {
      dragged = null;
    });

    document.addEventListener("touchend", function () {
      dragged = null;
    });
  </script>
</body>
</html>
