<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>LIMIT ZERO BREAKERS FITTING</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  min-height: 100vh;

  background:
    linear-gradient(rgba(10, 15, 35, 0.55), rgba(10, 15, 35, 0.65)),
    url("cafe-bg.png");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

.header {
  padding: 24px 20px 10px;
  text-shadow: 0 3px 12px rgba(0,0,0,0.6);
}

h1 {
  margin: 0;
  font-size: 34px;
  letter-spacing: 2px;
}

.subtitle {
  margin-top: 8px;
  color: #eef2ff;
}

.container {
  width: 90%;
  max-width: 980px;
  margin: 15px auto 40px;
  padding: 20px;
  border-radius: 28px;
  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.32);
  box-shadow: 0 20px 50px rgba(0,0,0,0.45);
}

/* 위쪽 버튼 영역 */
.top-controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 18px;
  padding: 14px;
  border-radius: 22px;
  background: rgba(255,255,255,0.18);
}

input {
  padding: 11px;
  background: white;
  color: #222;
  border-radius: 999px;
  border: none;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 999px;
  background: linear-gradient(135deg, #4d6cff, #8f6bff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 8px 18px rgba(0,0,0,0.28);
}

button:hover {
  transform: translateY(-2px);
}

#stage {
  width: 360px;
  height: 520px;
  margin: 0 auto;
  position: relative;
  background: rgba(255,255,255,0.92);
  border: 4px solid rgba(255,255,255,0.85);
  border-radius: 28px;
  overflow: hidden;
  box-shadow:
    inset 0 0 30px rgba(80,100,255,0.25),
    0 16px 40px rgba(0,0,0,0.45);
}

#stage::before {
  content: "FITTING ROOM";
  position: absolute;
  top: 15px;
  left: 0;
  right: 0;
  font-weight: bold;
  color: rgba(60,70,160,0.25);
  letter-spacing: 3px;
  z-index: 1;
}

#user, #costume {
  position: absolute;
  top: 0;
  left: 0;
  max-width: 100%;
}

#costume {
  width: 210px;
  left: 75px;
  top: 130px;
  cursor: grab;
  z-index: 3;
}

#user {
  z-index: 2;
}

.info {
  margin-top: 14px;
  color: #f3f5ff;
  font-size: 14px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div class="header">
  <h1>LIMIT ZERO BREAKERS CAFE</h1>
  <p class="subtitle">잠공정 카페 의상 피팅 체험</p>
</div>

<div class="container">

  <div class="top-controls">
    <input type="file" id="upload" accept="image/*">

    <button onclick="changeCostume('shion.png')">시온 의상</button>
    <button onclick="changeCostume('kaito.png')">카이토 의상</button>
    <button onclick="changeCostume('liz.png')">리즈 의상</button>

    <button onclick="makeBigger()">크게</button>
    <button onclick="makeSmaller()">작게</button>
  </div>

  <div id="stage">
    <img id="user">
    <img id="costume">
  </div>

  <p class="info">의상을 마우스로 끌어서 위치를 조절할 수 있습니다.</p>

</div>

<script>
const user = document.getElementById("user");
const costume = document.getElementById("costume");

document.getElementById("upload").onchange = function(e) {
  user.src = URL.createObjectURL(e.target.files[0]);
};

function changeCostume(fileName) {
  costume.src = fileName;
}

let costumeSize = 210;

function makeBigger() {
  costumeSize += 20;
  costume.style.width = costumeSize + "px";
}

function makeSmaller() {
  costumeSize -= 20;
  costume.style.width = costumeSize + "px";
}

let dragging = false;
let offsetX = 0;
let offsetY = 0;

costume.onmousedown = function(e) {
  dragging = true;
  offsetX = e.offsetX;
  offsetY = e.offsetY;
};

document.onmouseup = function() {
  dragging = false;
};

document.onmousemove = function(e) {
  if (dragging) {
    const stage = document.getElementById("stage").getBoundingClientRect();
    costume.style.left = (e.clientX - stage.left - offsetX) + "px";
    costume.style.top = (e.clientY - stage.top - offsetY) + "px";
  }
};
</script>

</body>
</html>
